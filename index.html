<style>

<body>
<div class="header">
  <div class="h-row">
    <div>
      <div class="title">Chiffre</div>
      <div class="sub" id="sub-line"><span class="dot" id="sync-dot"></span><span id="sync-txt">Prêt</span></div>
    </div>
    <div class="m-row">
      <button class="m-btn" onclick="changeMonth(-1)">‹</button>
      <div class="m-lbl" id="m-lbl"></div>
      <button class="m-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('saisie')">✦ SAISIE</button>
    <button class="tab" onclick="showTab('jours')">📅 JOURS</button>
    <button class="tab" onclick="showTab('stats')">📊 STATS</button>
    <button class="tab" onclick="showTab('export')">📤 EXPORT</button>
  </div>
</div>

<div class="body">
  <!-- SAISIE -->
  <div class="view active" id="view-saisie">
    <div class="hero">
      <div class="hero-deco"></div>
      <div class="hero-lbl">Total du mois</div>
      <div class="hero-amt" id="hero-amt">0€</div>
      <div class="hero-sub" id="hero-sub">Aucune journée encore</div>
    </div>
    <div class="card">
      <div class="card-t">✦ Nouvelle journée</div>
      <div class="r2">
        <div class="fw"><label class="lbl">Jour</label><input type="number" id="f-day" min="1" max="31" placeholder="19"></div>
        <div class="fw"><label class="lbl">Courses</label><input type="number" id="f-courses" placeholder="10"></div>
      </div>
      <div class="r3">
        <div class="fw"><label class="lbl">Début</label><input type="time" id="f-start" value="09:00" onchange="calcDur()"></div>
        <div class="fw"><label class="lbl">Fin</label><input type="time" id="f-end" value="18:00" onchange="calcDur()"></div>
        <div class="fw"><label class="lbl">Durée</label><div class="dur-badge" id="dur-badge">9h00</div></div>
      </div>
      <div class="r2">
        <div class="fw"><label class="lbl">Chiffre €</label><input type="number" id="f-amount" placeholder="850"></div>
        <div class="fw"><label class="lbl">Tps travail</label><input type="time" id="f-workdur"></div>
      </div>
      <button class="btn-add" onclick="addDay()">AJOUTER LA JOURNÉE</button>
    </div>
  </div>

  <!-- JOURS -->
  <div class="view" id="view-jours">
    <div style="margin-top:16px" id="days-list"></div>
  </div>

  <!-- STATS -->
  <div class="view" id="view-stats">
    <div style="margin-top:16px" id="stats-content"></div>
  </div>

  <!-- EXPORT -->
  <div class="view" id="view-export">
    <div style="margin-top:16px">
      <div class="card">
        <pre class="exp-pre" id="exp-pre">Aucune donnée.</pre>
        <button class="btn-copy" onclick="copyExport()">📋 COPIER LE TEXTE</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const now=new Date();
let year=now.getFullYear(),month=now.getMonth();

function t2m(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+(m||0)}
function m2s(m){if(!m||m<=0)return'0h00';return`${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}`}
function mk(){return`chiffre_${year}_${month}`}
function load(){try{return JSON.parse(localStorage.getItem(mk()))||[]}catch{return[]}}
function save(d){localStorage.setItem(mk(),JSON.stringify(d))}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function calcDur(){
  const s=document.getElementById('f-start').value;
  const e=document.getElementById('f-end').value;
  const d=t2m(e)-t2m(s);
  const b=document.getElementById('dur-badge');
  if(d>0){b.textContent=m2s(d);b.classList.add('active');
    document.getElementById('f-workdur').value=`${String(Math.floor(d/60)).padStart(2,'0')}:${String(d%60).padStart(2,'0')}`;
  }else{b.textContent='--';b.classList.remove('active')}
}

function updateMonthLabel(){
  document.getElementById('m-lbl').textContent=`${MONTHS[month]} ${year}`;
}

function changeMonth(dir){
  month+=dir;
  if(month<0){month=11;year--}
  if(month>11){month=0;year++}
  updateMonthLabel();renderAll();
}

function addDay(){
  const d=parseInt(document.getElementById('f-day').value);
  const c=parseInt(document.getElementById('f-courses').value);
  const s=document.getElementById('f-start').value;
  const e=document.getElementById('f-end').value;
  const a=parseFloat(document.getElementById('f-amount').value);
  const w=document.getElementById('f-workdur').value;
  const dur=t2m(e)-t2m(s);
  if(!d||isNaN(c)||!s||!e||isNaN(a)||a<=0){showToast('⚠️ Remplis tous les champs');return}
  const days=load();
  const entry={day:d,courses:c,start:s,end:e,amount:a,workdur:w,durMins:dur};
  const updated=[...days.filter(x=>x.day!==d),entry].sort((a,b)=>a.day-b.day);
  save(updated);
  document.getElementById('f-day').value='';
  document.getElementById('f-courses').value='';
  document.getElementById('f-amount').value='';
  showToast('✅ Journée ajoutée !');
  renderAll();showTab('jours');
}

function deleteDay(day){
  save(load().filter(d=>d.day!==day));
  showToast('🗑 Supprimé');renderAll();
}

function renderHero(){
  const days=load(),n=days.length;
  const total=days.reduce((s,d)=>s+d.amount,0);
  const courses=days.reduce((s,d)=>s+d.courses,0);
  document.getElementById('hero-amt').textContent=Math.round(total).toLocaleString('fr')+'€';
  document.getElementById('hero-sub').textContent=n>0?`${n} jours · moy ${Math.round(total/n)}€/j · ${courses} courses`:'Aucune journée encore';
  document.getElementById('sync-txt').textContent=n+' jour'+(n!==1?'s':'');
}

function renderDays(){
  const days=load(),el=document.getElementById('days-list');
  if(!days.length){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>Aucune journée ce mois-ci</div>';return}
  el.innerHTML=days.map(d=>`
    <div class="day-card">
      <div class="day-num">${String(d.day).padStart(2,'0')}</div>
      <div class="day-info">
        <div class="day-crs">${d.courses} courses · ${d.start.replace(':','h')}–${d.end.replace(':','h')}</div>
        <div class="day-hr">${d.workdur?d.workdur.replace(':','h'):m2s(d.durMins)} travaillé</div>
      </div>
      <div class="day-amt">${Math.round(d.amount)}€</div>
      <button class="del-btn" onclick="deleteDay(${d.day})">×</button>
    </div>`).join('');
}

function renderStats(){
  const days=load(),n=days.length,el=document.getElementById('stats-content');
  if(!n){el.innerHTML='<div class="empty"><div class="empty-icon">📊</div>Pas encore de données</div>';return}
  const total=days.reduce((s,d)=>s+d.amount,0);
  const courses=days.reduce((s,d)=>s+d.courses,0);
  const mins=days.reduce((s,d)=>s+(d.durMins||0),0);
  const best=days.reduce((a,b)=>a.amount>b.amount?a:b);
  el.innerHTML=`
    <div class="s-grid">
      <div class="s-card dark"><div class="s-lbl">Total mois</div><div class="s-val">${Math.round(total).toLocaleString('fr')}€</div><div class="s-sub">${n} jours</div></div>
      <div class="s-card"><div class="s-lbl">Moy / jour</div><div class="s-val">${Math.round(total/n)}€</div><div class="s-sub">par journée</div></div>
      <div class="s-card"><div class="s-lbl">Courses</div><div class="s-val">${courses}</div><div class="s-sub">moy ${(courses/n).toFixed(1)}/j</div></div>
      <div class="s-card"><div class="s-lbl">Heures</div><div class="s-val">${m2s(mins)}</div><div class="s-sub">moy ${m2s(Math.round(mins/n))}/j</div></div>
    </div>
    <div class="s-card" style="margin-bottom:10px"><div class="s-lbl">🏆 Meilleur jour</div><div class="s-val" style="font-size:18px">Jour ${best.day} — ${Math.round(best.amount)}€ · ${best.courses} courses</div></div>
    <div class="s-card" style="margin-bottom:10px"><div class="s-lbl">Rendement horaire</div><div class="s-val">${mins?(total/(mins/60)).toFixed(2):'—'}€/h</div></div>`;
}

function renderExport(){
  const days=load(),n=days.length;
  if(!n){document.getElementById('exp-pre').textContent='Aucune donnée à exporter.';return}
  const total=days.reduce((s,d)=>s+d.amount,0);
  const courses=days.reduce((s,d)=>s+d.courses,0);
  const mins=days.reduce((s,d)=>s+(d.durMins||0),0);
  let txt=`Chiffre ${MONTHS[month]} ${year}\n\n`;
  days.forEach(d=>{
    txt+=`${String(d.day).padStart(2,'0')} - ${String(d.courses).padStart(2,'0')} courses`;
    txt+=` - ${d.start.replace(':','h')}-${d.end.replace(':','h')} - ${Math.round(d.amount)}€`;
    if(d.workdur)txt+=` (${d.workdur.replace(':','h')})`;
    txt+='\n';
  });
  txt+=`\nChiffres ${Math.round(total)} €\nMoy chiffres sur ${n} jours ${Math.round(total/n)}€ / par jour`;
  txt+=`\nCourses ${courses} en moyenne ${Math.round(courses/n)}/ jours\nHeures ${m2s(mins)}\nMoyenne heures ${m2s(Math.round(mins/n))}`;
  document.getElementById('exp-pre').textContent=txt;
}

function copyExport(){
  const txt=document.getElementById('exp-pre').textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>showToast('📋 Copié!')).catch(()=>showToast('Erreur'))}
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('📋 Copié!')}
}

function renderAll(){renderHero();renderDays();renderStats();renderExport()}

function showTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['saisie','jours','stats','export'][i]===name);
  });
  document.querySelectorAll('.view').forEach(v=>{
    v.classList.toggle('active',v.id==='view-'+name);
  });
}

// Init
document.getElementById('f-day').value=now.getDate();
updateMonthLabel();
calcDur();
renderAll();
</script>
</body>
</html>
